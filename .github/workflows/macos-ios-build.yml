name: macOS iOS Cloud Builder

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build_ios:
    name: 🍏 Compile iOS on Mac Server
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout Codebase
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install Front-End Dependencies
        run: npm install

      - name: 🔨 Generate UI Web Assets
        run: npm run build

      - name: 🔄 Sync Capacitor iOS Logic
        run: |
          node -v
          npm -v
          npx cap sync ios

      - name: 🚀 Execute Xcode Compilation
        run: |
          cd ios/App
          
          # This command compiles the codebase natively on GitHub's macOS machine.
          # We use NO code-signing here to verify compilation success.
          # To output a Production App Store .ipa, you will need to add your Apple Developer Certificates to GitHub Repository Secrets!
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     build
